<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://kswikkoqfpyxuurzxail.supabase.co">
<link rel="dns-prefetch" href="https://api.paystack.co">
<link rel="dns-prefetch" href="https://api.shipbubble.com">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MC Store</title>
<!-- FAVICON -->
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="theme-color" content="#1a56db">
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MC Store">
<meta name="application-name" content="MC Store">
<meta name="msapplication-TileColor" content="#1a56db">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:       #1a56db;
    --blue-dark:  #1347c8;
    --blue-light: #eff6ff;
    --blue-mid:   #dbeafe;
    --gold:       #f5a623;
    --white:      #ffffff;
    --gray:       #6b7280;
    --bg:         #f0f7ff;
    --nav-h:      68px;
    --top-h:      62px;
    --nav-bg:     rgba(255,255,255,0.97);
    --shadow:     0 -8px 32px rgba(26,86,219,0.10);
  }

  *, *::before, *::after {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    margin: 0; padding: 0;
  }

  body, html {
    width: 100%; height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    overflow: hidden;
  }

  /* ══════════════════════════════
     APP SHELL
  ══════════════════════════════ */
  .app-shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100%;
    position: relative;
  }

  /* ══════════════════════════════
     TOP BAR (desktop only)
  ══════════════════════════════ */
  .top-bar {
    display: none;
    height: var(--top-h);
    background: var(--white);
    border-bottom: 1px solid #e2e8f0;
    box-shadow: 0 2px 16px rgba(26,86,219,0.07);
    padding: 0 2rem;
    align-items: center;
    justify-content: space-between;
    z-index: 9999;
    flex-shrink: 0;
  }

  .top-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 800;
    color: #0f172a;
    letter-spacing: -0.5px;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .top-logo span { color: var(--gold); }

  .top-nav-links {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .top-nav-item {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.55rem 1rem;
    border-radius: 10px;
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--gray);
    cursor: pointer;
    transition: all 0.25s ease;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
    position: relative;
  }
  .top-nav-item:hover { background: var(--blue-light); color: var(--blue); }
  .top-nav-item.active { background: var(--blue-light); color: var(--blue); }
  .top-nav-item.active i { color: var(--blue); }

  /* Cart badge on desktop */
  .top-cart-wrap { position: relative; }
  .top-badge {
    position: absolute;
    top: 4px; right: 8px;
    width: 17px; height: 17px;
    background: var(--gold);
    border-radius: 50%;
    font-size: 9px;
    font-weight: 800;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid white;
  }

  .top-right {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .top-user-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--blue-light);
    border: 2px solid var(--blue-mid);
    display: flex; align-items: center; justify-content: center;
    color: var(--blue); font-size: 16px;
    cursor: pointer; transition: all 0.25s;
  }
  .top-user-btn:hover { background: var(--blue-mid); }

  /* ══════════════════════════════
     CONTENT WINDOW
  ══════════════════════════════ */
  .content-window {
    flex: 1;
    width: 100%;
    position: relative;
    background: var(--bg);
    overflow: hidden;
  }

  /* ══════════════════════════════
     SECTIONS & IFRAMES
  ══════════════════════════════ */
  .section {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    display: none;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .section.active {
    display: block;
    opacity: 1;
  }

  iframe {
    width: 100%; height: 100%;
    border: none; display: block;
  }

  /* ══════════════════════════════
     3D SKELETON LOADER
     Blue & gold MC Store colours
  ══════════════════════════════ */
  .skeleton-loader {
    position: absolute;
    inset: 0;
    background: var(--white);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    gap: 1.25rem;
  }

  .loader-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 800;
    color: #0f172a;
    opacity: 0.5;
    animation: loaderPulse 1.4s ease-in-out infinite;
  }
  .loader-logo span { color: var(--gold); }

  @keyframes loaderPulse {
    0%,100% { opacity: 0.4; }
    50%      { opacity: 0.9; }
  }

  .loader-3d {
    width: 48px; height: 48px;
    position: relative;
    perspective: 160px;
  }

  .loader-3d div {
    position: absolute;
    width: 100%; height: 100%;
    border: 3.5px solid transparent;
    border-radius: 50%;
    animation: loader-rotate 1.3s cubic-bezier(0.5,0,0.5,1) infinite;
  }
  .loader-3d div:nth-child(1) { border-top-color: var(--blue);      animation-delay: -0.45s; }
  .loader-3d div:nth-child(2) { border-top-color: var(--gold);      animation-delay: -0.3s; }
  .loader-3d div:nth-child(3) { border-top-color: var(--blue-dark); animation-delay: -0.15s; }
  .loader-3d div:nth-child(4) { border-top-color: #93c5fd;          animation-delay: 0s; }

  @keyframes loader-rotate {
    0%   { transform: rotateX(35deg) rotateY(-45deg) rotateZ(0deg); }
    100% { transform: rotateX(35deg) rotateY(-45deg) rotateZ(360deg); }
  }

  /* ══════════════════════════════
     BOTTOM NAV (mobile)
  ══════════════════════════════ */
  .bottom-nav {
    height: var(--nav-h);
    background: var(--nav-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 1px solid rgba(26,86,219,0.10);
    box-shadow: var(--shadow);
    padding: 0 8px;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 9999;
    flex-shrink: 0;
  }

  .nav-item {
    flex: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    color: #94a3b8;
    transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    gap: 3px;
  }

  /* Neumorphic icon wrapper */
  .icon-wrap {
    width: 34px; height: 34px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 17px;
    border-radius: 10px;
    transition: all 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
    background: #f0f7ff;
    box-shadow:
      2px 2px 6px rgba(26,86,219,0.08),
      -2px -2px 6px rgba(255,255,255,0.9),
      inset 0 0 0 rgba(0,0,0,0.03);
    position: relative;
  }

  .nav-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-family: 'DM Sans', sans-serif;
  }

  /* Badge */
  .nav-badge {
    position: absolute;
    top: -4px; right: -4px;
    width: 16px; height: 16px;
    background: var(--gold);
    border-radius: 50%;
    font-size: 8px;
    font-weight: 800;
    color: white;
    display: none;
    align-items: center;
    justify-content: center;
    border: 2px solid white;
  }
  .nav-badge.show { display: flex; }

  /* Active state */
  .nav-item.active { color: var(--blue); }
  .nav-item.active .icon-wrap {
    transform: translateY(-7px) scale(1.12);
    background: var(--white);
    color: var(--blue);
    box-shadow:
      0 10px 24px rgba(26,86,219,0.22),
      0 4px 0 var(--blue),
      inset 0 -2px 6px rgba(26,86,219,0.08);
  }

  /* ══════════════════════════════
     CENTER CART BUTTON
  ══════════════════════════════ */
  .nav-item.center-cart {
    flex: 0 0 64px;
    margin-top: -28px;
  }

  .center-cart .icon-wrap {
    width: 56px; height: 56px;
    background: linear-gradient(145deg, var(--blue), var(--blue-dark));
    color: white;
    border-radius: 18px;
    font-size: 24px;
    border: 3px solid white;
    box-shadow:
      0 10px 24px rgba(26,86,219,0.40),
      0 4px 0 #0f3fa6,
      inset 0 2px 4px rgba(255,255,255,0.25);
  }

  .center-cart.active .icon-wrap {
    transform: translateY(3px);
    box-shadow:
      0 4px 10px rgba(26,86,219,0.3),
      0 1px 0 #0f3fa6,
      inset 0 2px 6px rgba(0,0,0,0.15);
  }

  .center-cart .nav-badge {
    top: -2px; right: 2px;
    width: 18px; height: 18px;
    font-size: 9px;
    border: 2.5px solid white;
  }

  /* ══════════════════════════════
     COMING SOON PLACEHOLDER
     For pages not yet built
  ══════════════════════════════ */
  .coming-soon {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--white);
    gap: 1rem;
    padding: 2rem;
    text-align: center;
  }

  .coming-soon-icon {
    width: 80px; height: 80px;
    border-radius: 24px;
    background: var(--blue-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    box-shadow: 0 8px 24px rgba(26,86,219,0.15);
    animation: iconFloat 3s ease-in-out infinite;
  }

  @keyframes iconFloat {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }

  .coming-soon h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 800;
    color: #0f172a;
    margin-top: 0.25rem;
  }

  .coming-soon p {
    font-size: 0.875rem;
    color: var(--gray);
    max-width: 240px;
    line-height: 1.6;
  }

  .coming-soon-badge {
    background: var(--blue-light);
    color: var(--blue);
    border: 1px solid var(--blue-mid);
    border-radius: 50px;
    padding: 0.4rem 1.1rem;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-top: 0.25rem;
  }

  /* ══════════════════════════════
     DESKTOP — show top bar,
     hide bottom nav
  ══════════════════════════════ */
  @media (min-width: 768px) {
    .top-bar    { display: flex; }
    .bottom-nav { display: none; }
  }
</style>
</head>
<body>

<div class="app-shell" id="appShell">

  <!-- ══ TOP BAR (desktop) ══ -->
  <header class="top-bar">

    <div class="top-logo">MC<span>Store</span></div>

    <nav class="top-nav-links">
      <button class="top-nav-item active" data-target="home">
        <i class="fas fa-house"></i> Home
      </button>
      <button class="top-nav-item" data-target="wishlist">
        <i class="fas fa-heart"></i> Wishlist
      </button>
      <button class="top-nav-item top-cart-wrap" data-target="cart">
        <i class="fas fa-cart-shopping"></i> Cart
        <span class="top-badge" id="topCartBadge" style="display:none;">0</span>
      </button>
      <button class="top-nav-item" data-target="orders">
        <i class="fas fa-box"></i> Orders
      </button>
      <button class="top-nav-item" data-target="account">
        <i class="fas fa-user"></i> Account
      </button>
    </nav>

    <div class="top-right">
      <div class="top-user-btn" data-target="account" id="topUserBtn">
        <i class="fas fa-user"></i>
      </div>
    </div>

  </header>

  <!-- ══ CONTENT WINDOW ══ -->
  <main class="content-window">

    <!-- HOME -->
    <div id="home" class="section active">
      <div class="skeleton-loader" id="loader-home">
        <div class="loader-logo">MC<span>Store</span></div>
        <div class="loader-3d"><div></div><div></div><div></div><div></div></div>
      </div>
      <iframe src="home.html" onload="document.getElementById('loader-home').style.display='none'" title="Home"></iframe>
    </div>

    <!-- WISHLIST — no src, loaded on first visit -->
    <div id="wishlist" class="section">
      <div class="skeleton-loader" id="loader-wishlist">
        <div class="loader-logo">MC<span>Store</span></div>
        <div class="loader-3d"><div></div><div></div><div></div><div></div></div>
      </div>
      <iframe title="Wishlist" id="frame-wishlist"></iframe>
    </div>

    <!-- CART — no src, loaded on first visit -->
    <div id="cart" class="section">
      <div class="skeleton-loader" id="loader-cart">
        <div class="loader-logo">MC<span>Store</span></div>
        <div class="loader-3d"><div></div><div></div><div></div><div></div></div>
      </div>
      <iframe title="Cart" id="frame-cart"></iframe>
    </div>

    <!-- ORDERS — no src, loaded on first visit -->
    <div id="orders" class="section">
      <div class="skeleton-loader" id="loader-orders">
        <div class="loader-logo">MC<span>Store</span></div>
        <div class="loader-3d"><div></div><div></div><div></div><div></div></div>
      </div>
      <iframe title="Orders" id="frame-orders"></iframe>
    </div>

    <!-- ACCOUNT — no src, loaded on first visit -->
    <div id="account" class="section">
      <div class="skeleton-loader" id="loader-account">
        <div class="loader-logo">MC<span>Store</span></div>
        <div class="loader-3d"><div></div><div></div><div></div><div></div></div>
      </div>
      <iframe title="Account" id="frame-account"></iframe>
    </div>

  </main>

  <!-- ══ BOTTOM NAV (mobile) ══ -->
  <nav class="bottom-nav">

    <!-- HOME -->
    <div class="nav-item active" data-target="home">
      <div class="icon-wrap"><i class="fas fa-house"></i></div>
      <span class="nav-label">Home</span>
    </div>

    <!-- WISHLIST -->
    <div class="nav-item" data-target="wishlist">
      <div class="icon-wrap">
        <i class="fas fa-heart"></i>
        <span class="nav-badge" id="wishBadge">0</span>
      </div>
      <span class="nav-label">Wishlist</span>
    </div>

    <!-- CART — center raised -->
    <div class="nav-item center-cart" data-target="cart">
      <div class="icon-wrap">
        <i class="fas fa-cart-shopping"></i>
        <span class="nav-badge" id="cartBadge">0</span>
      </div>
    </div>

    <!-- ORDERS -->
    <div class="nav-item" data-target="orders">
      <div class="icon-wrap"><i class="fas fa-box"></i></div>
      <span class="nav-label">Orders</span>
    </div>

    <!-- ACCOUNT -->
    <div class="nav-item" data-target="account">
      <div class="icon-wrap"><i class="fas fa-user"></i></div>
      <span class="nav-label">Account</span>
    </div>

  </nav>

</div><!-- /app-shell -->

<script type="module">
  import { requireAuth } from './auth.js';

  // ── GUARD: must be logged in ──
  requireAuth().catch(() => {});

  // ── ALL NAV ITEMS (bottom + top) ──
  const allNavItems = document.querySelectorAll('[data-target]');
  const sections    = document.querySelectorAll('.section');

  // Pages loaded so far (lazy load on first visit)
  const _loaded = { home: true }; // home loads immediately
  let _currentTab = 'home';
  let _cartDirty  = false;

  // Pages and their file names
  const PAGE_SRC = {
    wishlist: 'wishlist.html',
    cart:     'cart.html',
    orders:   'orders.html',
    account:  'account.html'
  };

  function loadFrame(tab) {
    const frame  = document.getElementById('frame-' + tab);
    const loader = document.getElementById('loader-' + tab);
    if (!frame || frame.src.includes(PAGE_SRC[tab])) return; // already loaded
    frame.onload = () => { if (loader) loader.style.display = 'none'; };
    frame.src = PAGE_SRC[tab];
  }

  function switchTab(target) {
    if (target === _currentTab) return; // already here — do nothing
    _currentTab = target;

    // Nav highlights
    allNavItems.forEach(el => {
      el.classList.toggle('active', el.dataset.target === target);
    });

    // Show/hide sections
    sections.forEach(sec => {
      sec.classList.toggle('active', sec.id === target);
    });

    // Load iframe on first visit — or reload cart if new items added
    if (target === 'cart') {
      const frame = document.getElementById('frame-cart');
      if (!_loaded.cart) {
        _loaded.cart = true;
        _cartDirty   = false;
        loadFrame('cart');
      } else if (_cartDirty) {
        _cartDirty = false;
        if (frame) frame.src = 'cart.html';
      }
    } else if (PAGE_SRC[target] && !_loaded[target]) {
      _loaded[target] = true;
      loadFrame(target);
    }

    if (window.navigator.vibrate) window.navigator.vibrate(12);
    sessionStorage.setItem('mc_active_tab', target);
  }

  // Click handlers
  allNavItems.forEach(item => {
    item.addEventListener('click', () => {
      const t = item.dataset.target;
      if (t) switchTab(t);
    });
  });

  // Restore last tab once on load
  // Handle manifest shortcuts like ?tab=orders
  const urlTab = new URLSearchParams(window.location.search).get('tab');
  if (urlTab) {
    switchTab(urlTab);
  } else {
    const lastTab = sessionStorage.getItem('mc_active_tab');
    if (lastTab && lastTab !== 'home') switchTab(lastTab);
  }

  // Message listener — badges and tab switching only
  window.addEventListener('message', (e) => {
    if (!e.data || !e.data.type) return;

    if (e.data.type === 'cartUpdate') {
      const count    = Number(e.data.count) || 0;
      const badge    = document.getElementById('cartBadge');
      const topBadge = document.getElementById('topCartBadge');
      if (badge)    { badge.textContent = count; badge.classList.toggle('show', count > 0); }
      if (topBadge) { topBadge.textContent = count; topBadge.style.display = count > 0 ? 'flex' : 'none'; }
      _cartDirty = true; // reload cart next time user opens it
    }

    if (e.data.type === 'wishlistUpdate') {
      const count = Number(e.data.count) || 0;
      const badge = document.getElementById('wishBadge');
      if (badge) { badge.textContent = count; badge.classList.toggle('show', count > 0); }
    }

    if (e.data.type === 'switchTab') switchTab(e.data.target);
    if (e.data.type === 'openProduct') window.location.href = e.data.url;
  });

  // Viewport height fix — debounced so it doesn't fire constantly
  let _resizeTimer;
  function fixHeight() {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(() => {
      document.getElementById('appShell').style.height = window.innerHeight + 'px';
    }, 150);
  }
  window.addEventListener('resize', fixHeight);
  fixHeight();
</script>

  position:fixed;bottom:0;left:0;right:0;z-index:9999;

  <div style="flex:1;min-width:0;">
    <div style="font-size:.85rem;font-weight:800;color:#0f172a">Add MC Store to Home Screen</div>
    <div style="font-size:.72rem;color:#64748b;margin-top:1px">Shop faster — works like a real app</div>

  <button id="pwaInstallBtn" style="

<!-- ── iOS INSTALL HINT (shown on Safari only) ── -->
<div id="iosInstallHint" style="
  position:fixed;bottom:0;left:0;right:0;z-index:9999;
  background:#fff;border-top:2px solid #dbeafe;
  padding:1rem 1.25rem calc(1rem + env(safe-area-inset-bottom,0px));
  display:none;flex-direction:column;gap:.5rem;
  box-shadow:0 -4px 24px rgba(26,86,219,.15);
  font-family:'DM Sans',system-ui,sans-serif;
">
  <div style="display:flex;align-items:center;gap:.75rem;">
    <div style="width:40px;height:40px;border-radius:10px;background:#eff6ff;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0">🛍️</div>
    <div>
      <div style="font-size:.85rem;font-weight:800;color:#0f172a">Install MC Store</div>
      <div style="font-size:.72rem;color:#64748b">Tap the share button below, then "Add to Home Screen"</div>
    </div>
    <div id="iosInstallClose" style="color:#94a3b8;cursor:pointer;margin-left:auto;font-size:1rem;padding:4px">✕</div>
  </div>
  <div style="display:flex;align-items:center;gap:.5rem;background:#f0f7ff;border-radius:10px;padding:.6rem .85rem;">
    <span style="font-size:.78rem;color:#1a56db;font-weight:600">1. Tap</span>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a56db" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
    <span style="font-size:.78rem;color:#1a56db;font-weight:600">Share → "Add to Home Screen"</span>
  </div>
</div>

<script>
// ── SERVICE WORKER + PUSH SUBSCRIPTION ──
const VAPID_PUBLIC_KEY = "BIITnLNCVHkxlQHVb7ai6ihI3yl15LByl7iV7pms4acVFbl2cgNMGJjwvE-pRGqYO7ZVHdVjAy5sqMEwfUT5NJA";

function urlB64ToUint8(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const b64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = window.atob(b64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function subscribeToPush(uid) {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    const reg  = await navigator.serviceWorker.ready;
    const sub  = await reg.pushManager.subscribe({
      userVisibleOnly:      true,
      applicationServerKey: urlB64ToUint8(VAPID_PUBLIC_KEY)
    });
    // Save subscription to server
    await fetch('/api/push', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action:'subscribe', uid, subscription: sub.toJSON() })
    });
    console.log('[PWA] Push subscription saved');
  } catch(e) {
    console.warn('[PWA] Push subscribe failed:', e.message);
  }
}

async function requestPushPermission(uid) {
  if (!uid || !('Notification' in window)) return;
  if (Notification.permission === 'granted') { subscribeToPush(uid); return; }
  if (Notification.permission === 'denied') return;
  // Ask permission
  const permission = await Notification.requestPermission();
  if (permission === 'granted') subscribeToPush(uid);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then(reg => {
        console.log('[PWA] Service Worker registered, scope:', reg.scope);
      })
      .catch(err => console.warn('[PWA] SW registration failed:', err));
  });

  // Listen for push messages from SW (update bell badge instantly)
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.type === 'pushReceived') {
      // Tell the home iframe to refresh notifications
      const homeFrame = document.querySelector('iframe[src*="home.html"]');
      if (homeFrame?.contentWindow) {
        homeFrame.contentWindow.postMessage({ type:'refreshNotifs' }, '*');
      }
    }
  });
}

// Request push permission once user is logged in
// Called from session load (patched below via postMessage from iframes)
window.addEventListener('message', e => {
  if (e.data?.type === 'userLoggedIn' && e.data.uid) {
    requestPushPermission(e.data.uid);
  }
});

// ── INSTALL PROMPT (Android / Chrome) ──
let deferredPrompt = null;
const installBanner = document.getElementById('pwaInstallBanner');
const installBtn    = document.getElementById('pwaInstallBtn');
const installClose  = document.getElementById('pwaInstallClose');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show banner after 3 seconds, only if not already installed or dismissed
  if (!localStorage.getItem('pwa_dismissed')) {
    setTimeout(() => { installBanner.style.display = 'flex'; }, 3000);
  }
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  installBanner.style.display = 'none';
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  console.log('[PWA] Install outcome:', outcome);
  deferredPrompt = null;
  if (outcome === 'accepted') {
    localStorage.setItem('pwa_installed', '1');
  }
});

installClose.addEventListener('click', () => {
  installBanner.style.display = 'none';
  localStorage.setItem('pwa_dismissed', '1');
});

// ── iOS INSTALL HINT (Safari) ──
const isIOS    = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isSafari = /safari/i.test(navigator.userAgent) && !/chrome/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone === true;
const iosHint  = document.getElementById('iosInstallHint');

if (isIOS && isSafari && !isStandalone && !localStorage.getItem('pwa_dismissed')) {
  setTimeout(() => { iosHint.style.display = 'flex'; }, 4000);
}

document.getElementById('iosInstallClose').addEventListener('click', () => {
  iosHint.style.display = 'none';
  localStorage.setItem('pwa_dismissed', '1');
});

// Hide bottom nav padding when PWA installed (standalone mode)
if (window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches) {
  document.body.classList.add('pwa-standalone');
}
</script>
